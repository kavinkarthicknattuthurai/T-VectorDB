name: T-VectorDB CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: Build & Test Rust Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Protobuf Compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libprotobuf-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.80.0
          components: clippy, rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check Formatting
        run: cargo fmt -- --check

      - name: Run Clippy Linter
        run: cargo clippy -- -D warnings

      - name: Run Unit Tests
        run: cargo test --release --verbose

  python-sdk:
    name: Build & Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SDK in Editable Mode
        working-directory: ./clients/python
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Test Python Output
        working-directory: ./clients/python
        run: |
          python -c "import tvectordb; print('T-VectorDB Python SDK imported successfully!')"
